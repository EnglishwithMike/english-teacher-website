<!DOCTYPE html>
<html>
<head>
    <title>LearningXY</title>
    <meta name="description" content="Online English, Greek and Spanish lessons with LearningXY. Book one-to-one language lessons online.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
    {% include "posthog.html" %}
</head>
<body>

<div class="language-switcher">
    <a href="/?lang=en">🇬🇧</a> |
    <a href="/?lang=el">🇬🇷</a> |
    <a href="/?lang=es">🇪🇸</a>
</div>

<div class="home-panel"> 

    <h1>LearningXY</h1>

    <p><strong>{{ t.slogan }}</strong></p>

<p style="color:#1e7e34; font-weight:bold; margin-top:10px;">
🎉 First lesson FREE with Mike & Michalis!
</p>

    <div class="teacher-cards">

        <div class="teacher-card">
            <h2>🇬🇧 Mike</h2>
            <p>{{ t.english_lessons }}</p>
            <a href="/booking?lang={{ lang }}">
                <button onclick="posthog.capture('book_english_clicked')">{{ t.book_english }}</button>
            </a>
        </div>

        <div class="teacher-card">
            <h2>🇬🇷 Michalis</h2>
            <p>{{ t.greek_lessons }}</p>
            <a href="/booking/michalis?lang={{ lang }}">
                <button onclick="posthog.capture('book_greek_clicked')">{{ t.book_greek }}</button>
            </a>
        </div>

        <div class="teacher-card">
            <h2>🇪🇸 Emily</h2>
            <p>{{ t.spanish_lessons }}</p>
            <a href="/booking/emily?lang={{ lang }}">
                <button onclick="posthog.capture('book_spanish_clicked')">{{ t.book_spanish }}</button>
            </a>
        </div>

    </div>

</div>

</body>
</html>
